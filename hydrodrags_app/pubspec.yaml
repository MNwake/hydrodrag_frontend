name: hydrodrags_app
description: "HydroDrags mobile application for racer registration, membership, and waiver management."
publish_to: 'none'

version: 1.2.0+9

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2

  # iOS-style icons
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # HTTP client
  http: ^1.2.0

  # WebSocket for live event updates
  web_socket_channel: ^3.0.1

  # Signature capture
  signature: ^5.5.0

  # Image handling
  image_picker: ^1.1.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # External links
  url_launcher: ^6.3.1

  # Calendar integration
  add_2_calendar: ^3.0.1

  # PDF generation
  pdf: ^3.11.3

  # HTML rendering (waiver content from config)
  flutter_widget_from_html: ^0.17.1

  # YouTube playback
  youtube_player_flutter: ^9.0.0

  # QR code generation
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/sponsors/
    - assets/images/media/

# App launcher icon configuration
# NOTE:
# - app_icon.png MUST be 1024x1024
# - NO transparency
# - PNG format
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true